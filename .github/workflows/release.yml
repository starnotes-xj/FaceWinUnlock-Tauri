name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动指定 tag（留空则使用当前 commit 生成）'
        required: false
        type: string
      prerelease:
        description: '标记为 pre-release'
        type: boolean
        default: false

env:
  OPENCV_VERSION: '4.12.0'
  CARGO_TERM_COLOR: always
  LLVM_ROOT: 'D:\LLVM'

jobs:
  build:
    name: Build & Release (${{ github.ref_name }})
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      # ---- OpenCV (cached to avoid re-downloading 300MB+) ----
      - name: Cache OpenCV
        id: opencv-cache
        uses: actions/cache@v4
        with:
          path: D:\OpenCV
          key: opencv-${{ env.OPENCV_VERSION }}-v1

      - name: Download & Extract OpenCV
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading OpenCV $env:OPENCV_VERSION..."
          $url = "https://github.com/opencv/opencv/releases/download/$env:OPENCV_VERSION/opencv-$env:OPENCV_VERSION-windows.exe"
          $installer = "$env:RUNNER_TEMP\opencv-installer.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer -RetryIntervalSec 10 -MaximumRetryCount 3
          Write-Host "Extracting OpenCV (this may take a minute)..."
          & 7z x $installer "-o$env:RUNNER_TEMP\opencv_tmp" -y | Out-Null
          $extracted = Get-ChildItem "$env:RUNNER_TEMP\opencv_tmp" -Directory | Select-Object -First 1
          Move-Item $extracted.FullName D:\OpenCV
          Remove-Item "$env:RUNNER_TEMP\opencv_tmp" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "OpenCV installed:"
          Get-ChildItem D:\OpenCV | Select-Object Name

      - name: Set OpenCV environment
        shell: pwsh
        run: |
          "OPENCV_LINK_PATHS=D:\OpenCV\build\x64\vc16\lib" >> $env:GITHUB_ENV
          "OPENCV_INCLUDE_PATHS=D:\OpenCV\build\include" >> $env:GITHUB_ENV
          "D:\OpenCV\build\x64\vc16\bin" >> $env:GITHUB_PATH

      # ---- LLVM (required by clang-sys / opencv crate build) ----
      # clang-sys / opencv-binding-generator need a discoverable libclang.
      - name: Install LLVM
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Test-LlvmRoot {
            param([string]$Root)

            if (-not $Root -or -not (Test-Path $Root)) {
              return $false
            }

            return (Test-Path (Join-Path $Root "bin\libclang.dll")) -and `
              (Test-Path (Join-Path $Root "lib\libclang.lib"))
          }

          function Find-LlvmRoot {
            $candidateRoots = @(
              "$env:LLVM_ROOT",
              "${env:ProgramFiles}\LLVM",
              "${env:ProgramFiles(x86)}\LLVM",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\x64",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional\VC\Tools\Llvm\x64",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\VC\Tools\Llvm\x64"
            ) | Where-Object { $_ -and (Test-Path $_) }

            foreach ($root in $candidateRoots) {
              if (Test-LlvmRoot $root) {
                return (Resolve-Path $root).Path
              }
            }

            $clang = Get-Command clang.exe -ErrorAction SilentlyContinue
            if ($clang) {
              $bin = Split-Path $clang.Source -Parent
              $root = Split-Path $bin -Parent
              if (Test-LlvmRoot $root) {
                return $root
              }
            }

            return $null
          }

          $sourceRoot = Find-LlvmRoot
          if (-not $sourceRoot) {
            Write-Host "Installing LLVM..."
            choco install llvm -y --no-progress --limit-output
            $sourceRoot = Find-LlvmRoot
          }

          if (-not $sourceRoot) {
            throw "LLVM with bin\libclang.dll and lib\libclang.lib was not found after installation."
          }

          $llvmRoot = $env:LLVM_ROOT
          $sourceRoot = (Resolve-Path $sourceRoot).Path
          $sameRoot = (Test-Path $llvmRoot) -and ((Resolve-Path $llvmRoot).Path -eq $sourceRoot)
          if ((Test-Path $llvmRoot) -and -not $sameRoot) {
            Remove-Item -LiteralPath $llvmRoot -Recurse -Force
          }
          if (-not (Test-Path $llvmRoot)) {
            New-Item -ItemType Directory -Path $llvmRoot | Out-Null
          }

          if (-not $sameRoot) {
            foreach ($dir in @("bin", "lib", "include")) {
              $src = Join-Path $sourceRoot $dir
              if (Test-Path $src) {
                $dst = Join-Path $llvmRoot $dir
                if (Test-Path $dst) {
                  Remove-Item -LiteralPath $dst -Recurse -Force
                }
                Copy-Item -LiteralPath $src -Destination $dst -Recurse -Force
              }
            }
          }

          $llvmBin = Join-Path $llvmRoot "bin"
          $libclang = Join-Path $llvmBin "libclang.dll"
          if (-not (Test-Path $libclang)) {
            throw "Normalized LLVM is missing libclang.dll: $libclang"
          }
          $libclangImportLib = Join-Path $llvmRoot "lib\libclang.lib"
          if (-not (Test-Path $libclangImportLib)) {
            throw "Normalized LLVM is missing libclang.lib: $libclangImportLib"
          }

          $llvmConfig = Join-Path $llvmBin "llvm-config.cmd"
          @"
          @echo off
          if "%~1"=="--prefix" (
            echo $llvmRoot
            exit /b 0
          )
          if "%~1"=="--includedir" (
            echo $llvmRoot\include
            exit /b 0
          )
          echo $llvmRoot
          "@ | Set-Content -Path $llvmConfig -Encoding ASCII

          Write-Host "LLVM source: $sourceRoot"
          Write-Host "LLVM root: $llvmRoot"
          Get-Item $libclang | Select-Object FullName, Length
          Get-Item $libclangImportLib | Select-Object FullName, Length

          "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
          "LLVM_CONFIG_PATH=$llvmConfig" >> $env:GITHUB_ENV
          "LIBCLANG_STATIC=0" >> $env:GITHUB_ENV
          $llvmBin >> $env:GITHUB_PATH

      - name: Verify LLVM environment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:LIBCLANG_PATH) {
            throw "LIBCLANG_PATH is not set"
          }
          $libclang = Join-Path $env:LIBCLANG_PATH "libclang.dll"
          if (-not (Test-Path $libclang)) {
            throw "LIBCLANG_PATH does not contain libclang.dll: $env:LIBCLANG_PATH"
          }
          $llvmRoot = Split-Path $env:LIBCLANG_PATH -Parent
          $libclangImportLib = Join-Path $llvmRoot "lib\libclang.lib"
          if (-not (Test-Path $libclangImportLib)) {
            throw "LLVM root does not contain libclang.lib: $libclangImportLib"
          }
          if (-not $env:LLVM_CONFIG_PATH -or -not (Test-Path $env:LLVM_CONFIG_PATH)) {
            throw "LLVM_CONFIG_PATH is not set to the generated llvm-config shim"
          }
          $prefix = & $env:LLVM_CONFIG_PATH --prefix
          if ($prefix.TrimEnd() -ne $env:LLVM_ROOT) {
            throw "llvm-config --prefix returned '$prefix', expected '$env:LLVM_ROOT'"
          }
          Write-Host "Using LIBCLANG_PATH=$env:LIBCLANG_PATH"
          Write-Host "Using LLVM_CONFIG_PATH=$env:LLVM_CONFIG_PATH"
          Get-Item $libclang | Select-Object FullName, Length
          Get-Item $libclangImportLib | Select-Object FullName, Length

      # ---- Rust builds ----
      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-release-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Server DLL + Unlock EXE
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo clean -p clang-sys
          cargo build --release -p winlogon -p unlock

      - name: Verify Server DLL & Unlock EXE
        shell: pwsh
        run: |
          $dll = "target\release\FaceWinUnlock_Tauri.dll"
          $exe = "target\release\FaceWinUnlock-Server.exe"
          if (-not (Test-Path $dll)) { throw "Missing: $dll" }
          if (-not (Test-Path $exe)) { throw "Missing: $exe" }
          Write-Host "Server DLL: $((Get-Item $dll).Length) bytes"
          Write-Host "Unlock EXE: $((Get-Item $exe).Length) bytes"

      # ---- Tauri UI build ----
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: UI/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('UI/package-lock.json') }}

      - name: Install npm dependencies
        working-directory: UI
        run: npm ci

      - name: Build Tauri installer
        working-directory: UI
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ---- Release ----
      - name: Determine release metadata
        id: release_meta
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          # Strip leading 'v' for display version
          $version = $refName -replace '^v', ''
          $isPrerelease = "${{ github.event.inputs.prerelease }}" -eq "true"
          # Tag-driven releases are never prerelease unless the tag itself indicates it
          if ($refName -match '-(alpha|beta|rc|pre|dev)') {
            $isPrerelease = $true
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version, Prerelease: $isPrerelease"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.release_meta.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            target/release/FaceWinUnlock_Tauri.dll
            target/release/FaceWinUnlock-Server.exe
            UI/src-tauri/target/release/bundle/nsis/*.exe
            UI/src-tauri/target/release/bundle/msi/*.msi
