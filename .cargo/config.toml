# 工作区级 Cargo 配置
# 强制所有成员使用 D:\OpenCV (4.12.0 world 版本) 而非系统中可能存在的其他 OpenCV

[env]
# opencv-rust crate 读取这三个变量来定位头文件、lib 和库名
# force = true 确保覆盖系统中已设置的同名环境变量（如 OPENCV_DIR 指向旧版本）
OPENCV_INCLUDE_PATHS = { value = "D:\\OpenCV\\build\\include", force = true }
OPENCV_LINK_PATHS    = { value = "D:\\OpenCV\\build\\x64\\vc16\\lib", force = true }
OPENCV_LINK_LIBS     = { value = "opencv_world4120", force = true }
LIBCLANG_PATH        = { value = "D:\\LLVM\\bin", force = true }
