<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!--
  动画源：uiverse.io smart-falcon-33 (作者 JaydipPrajapati1910)
  设计：3D 拟物按钮 + 0.5s 高速旋转的橘黄色火环（blur 模糊外溢）
  → 适配到本项目的 200×200 透明背景捕获管线
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* CRITICAL: 200×200 必须与 capture_frames.js WIDTH/HEIGHT、
     animation.rs ANIM_WIDTH/ANIM_HEIGHT 三方同步 */
  body {
    width: 200px; height: 200px;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* 外层按钮：160×160 圆形，深色边框 + 3D 拟物阴影
     注意：边距 20px 给 blur 火环外溢留缓冲 */
  .loader {
    position: relative;
    width: 160px;
    height: 160px;
    border: 4px solid #282828;
    overflow: hidden;
    border-radius: 50%;
    box-shadow:
      -5px -5px 5px rgba(255, 255, 255, 0.1),
      10px 10px 10px rgba(0, 0, 0, 0.4),
      inset -5px -5px 5px rgba(255, 255, 255, 0.2),
      inset 10px 10px 10px rgba(0, 0, 0, 0.4);
  }

  /* 中心圆盘：嵌入按钮的深色面板（保留中心圆盘，按用户选择不透明） */
  .loader::before {
    content: "";
    position: absolute;
    top: 25px;
    left: 25px;
    right: 25px;
    bottom: 25px;
    z-index: 10;
    background: #212121;
    border-radius: 50%;
    border: 2px solid #292929;
    box-shadow:
      inset -2px -2px 5px rgba(255, 255, 255, 0.2),
      inset 3px 3px 5px rgba(0, 0, 0, 0.5);
  }

  /* 旋转火环：z-index:-1 落在中心圆盘之下，但被外圈 overflow:hidden 裁切
     blur(20px) 让色彩从环带边缘扩散出来 */
  .loader span {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background-image: linear-gradient(
      -225deg,
      #ff7402 0%,
      #ffe700 50%,
      #fff55e 100%
    );
    filter: blur(20px);
    z-index: -1;
    /* 1s 一圈 = 6 圈/6s，与 FRAME_PERIOD 对齐；
       30fps 捕获时每帧 12° 跳变，肉眼看不到强频闪（0.5s 时是 24°/帧） */
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="loader">
    <span></span>
  </div>
</body>
</html>
